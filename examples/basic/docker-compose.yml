name: temporal-stripe-example

services:
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal-stripe-temporal
    environment:
      - DB=sqlite
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-stripe-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped
